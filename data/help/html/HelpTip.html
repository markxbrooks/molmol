<H1>HelpTip</H1>
<STRONG>NAME</STRONG><P>
<PRE>
HelpTip - show "Tip of the Day"
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
HelpTip
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Show "Tip of the Day". Automatic display at program
startup can be switched on/off with a toggle in the
dialog box.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
HelpTip
</PRE>

980720
