<H1>WriteDg</H1>
<STRONG>NAME</STRONG><P>
<PRE>
WriteDg - write DG file
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
WriteDg fileName
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Write a file in DG format. All selected molecules
are written to the file.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
WriteDg /home/joe/struct/my_prot.cor
</PRE>
