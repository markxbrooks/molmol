<H1>RadiusInit</H1>
<STRONG>NAME</STRONG><P>
<PRE>
RadiusInit - set initial radius
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
RadiusInit expr
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Set the inital radius of new objects.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
RadiusInit 1.0
</PRE>
