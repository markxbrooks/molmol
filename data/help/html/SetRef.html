<H1>SetRef</H1>
<STRONG>NAME</STRONG><P>
<PRE>
SetRef - set reference atoms
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
SetRef
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Use the currently selected atoms as reference atoms.
The reference atoms are used for selecting atoms by
distance.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
SetRef
</PRE>
