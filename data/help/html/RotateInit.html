<H1>RotateInit</H1>
<STRONG>NAME</STRONG><P>
<PRE>
RotateInit - undo all rotations
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
RotateInit
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Bring all movable (set with <A HREF="DialMol.html"><KBD>DialMol</KBD></A>) molecules back
to their original orientation.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
RotateInit
</PRE>
