<H1>StyleAtom</H1>
<STRONG>NAME</STRONG><P>
<PRE>
StyleAtom - set display style of atoms
</PRE>
<STRONG>SYNOPSIS</STRONG><P>
<PRE>
StyleAtom ( invisible | sphere | tetrahedron )
</PRE>
<STRONG>DESCRIPTION</STRONG><P>
Set the display style of all selected atoms.
<P>
<STRONG>EXAMPLE</STRONG><P>
<PRE>
StyleAtom sphere
</PRE>
